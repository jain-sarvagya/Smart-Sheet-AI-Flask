# render.yaml - Render Blueprint Configuration
# Learn more at https://render.com/docs/blueprints

services:
  # 1. Flask Backend API Web Service
  - type: web
    name: smart-sheet-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smart-sheet-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: UPLOAD_FOLDER
        value: uploads
      - key: GEMINI_API_KEY
        sync: false # User will input this manually in the Render dashboard

  # 2. React Frontend Static Site
  - type: web
    name: smart-sheet-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    plan: free
    routes:
      # Rewrite rule to route all static paths to index.html (necessary for React Router SPA)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://smart-sheet-backend.onrender.com/api

databases:
  # 3. PostgreSQL Database Instance
  - name: smart-sheet-db
    plan: free
